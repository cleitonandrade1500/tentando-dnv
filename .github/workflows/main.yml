name: Compilar Mod Direto
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ps4-payload-sdk/toolchain:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Mod_Assalto_PS4
          path: "*.sprx"
